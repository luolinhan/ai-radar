services:
  postgres:
    image: postgres:15-alpine
    container_name: ai-radar-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-ai_radar}
      POSTGRES_USER: ${POSTGRES_USER:-ai_radar}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ai_radar_password}
    volumes:
      - ./data/pg:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ai_radar}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: ai-radar-redis
    command: redis-server --appendonly yes
    volumes:
      - ./data/redis:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  rsshub:
    image: diygod/rsshub:latest
    container_name: ai-radar-rsshub
    environment:
      CACHE_EXPIRE: 300
      REQUEST_RETRY: 3
    restart: unless-stopped

  api:
    build:
      context: ./apps/api
      dockerfile: Dockerfile
    container_name: ai-radar-api
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-ai_radar}
      POSTGRES_USER: ${POSTGRES_USER:-ai_radar}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ai_radar_password}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      AI_API_BASE_URL: ${AI_API_BASE_URL}
      AI_API_KEY: ${AI_API_KEY}
      AI_MODEL: ${AI_MODEL:-qwen3.5-plus}
      GITHUB_TOKEN: ${GITHUB_TOKEN}
      FEISHU_WEBHOOK_URL: ${FEISHU_WEBHOOK_URL}
    ports:
      - "${API_PORT:-8000}:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rsshub:
        condition: service_started
    volumes:
      - ./configs:/app/configs:ro
    restart: unless-stopped

  worker-collector:
    build:
      context: ./apps/worker-collector
      dockerfile: Dockerfile
    container_name: ai-radar-collector
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-ai_radar}
      POSTGRES_USER: ${POSTGRES_USER:-ai_radar}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ai_radar_password}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      GITHUB_TOKEN: ${GITHUB_TOKEN}
      RSS_COLLECT_INTERVAL_MINUTES: ${RSS_COLLECT_INTERVAL_MINUTES:-120}
      GITHUB_COLLECT_INTERVAL_MINUTES: ${GITHUB_COLLECT_INTERVAL_MINUTES:-180}
      X_COLLECT_INTERVAL_MINUTES: ${X_COLLECT_INTERVAL_MINUTES:-240}
      WEB_COLLECT_INTERVAL_MINUTES: ${WEB_COLLECT_INTERVAL_MINUTES:-360}
      RSSHUB_URL: ${RSSHUB_URL:-http://rsshub:1200}
      RSSHUB_BACKUP_URLS: ${RSSHUB_BACKUP_URLS:-https://rsshub.pseudoyu.com,https://rsshub.app,https://rsshub.litecy.com}
      RSS_MAX_ITEMS_PER_FEED: ${RSS_MAX_ITEMS_PER_FEED:-10}
      GITHUB_MAX_RELEASES_PER_REPO: ${GITHUB_MAX_RELEASES_PER_REPO:-5}
      X_MAX_ITEMS_PER_ACCOUNT: ${X_MAX_ITEMS_PER_ACCOUNT:-5}
      WEB_MAX_ITEMS_PER_SITE: ${WEB_MAX_ITEMS_PER_SITE:-3}
      WATCH_ENTITIES_PATH: ${WATCH_ENTITIES_PATH:-/app/configs/watchlists/entities.json}
      SOURCE_TARGETS_PATH: ${SOURCE_TARGETS_PATH:-/app/configs/watchlists/source_targets.json}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      rsshub:
        condition: service_started
    volumes:
      - ./configs:/app/configs:ro
    restart: unless-stopped

  worker-ai:
    build:
      context: ./apps/worker-ai
      dockerfile: Dockerfile
    container_name: ai-radar-ai
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      POSTGRES_DB: ${POSTGRES_DB:-ai_radar}
      POSTGRES_USER: ${POSTGRES_USER:-ai_radar}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ai_radar_password}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      AI_API_BASE_URL: ${AI_API_BASE_URL}
      AI_API_KEY: ${AI_API_KEY}
      AI_MODEL: ${AI_MODEL:-qwen3.5-plus}
      FEISHU_WEBHOOK_URL: ${FEISHU_WEBHOOK_URL}
      ALERT_SCAN_INTERVAL_MINUTES: ${ALERT_SCAN_INTERVAL_MINUTES:-10}
      ALERT_MAX_PER_RUN: ${ALERT_MAX_PER_RUN:-3}
      ALERT_DEDUP_HOURS: ${ALERT_DEDUP_HOURS:-24}
      ALERT_LOOKBACK_HOURS: ${ALERT_LOOKBACK_HOURS:-72}
      ALERT_MIN_QUALITY_SCORE: ${ALERT_MIN_QUALITY_SCORE:-4}
      ALERT_SIGNAL_KEYWORDS: ${ALERT_SIGNAL_KEYWORDS:-}
      DASHBOARD_PUBLIC_URL: ${DASHBOARD_PUBLIC_URL:-http://localhost:3000}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./configs:/app/configs:ro
    restart: unless-stopped

  dashboard:
    build:
      context: ./apps/dashboard
      dockerfile: Dockerfile
    container_name: ai-radar-dashboard
    environment:
      NEXT_PUBLIC_API_URL: http://${API_HOST:-localhost}:${API_PORT:-8000}
    ports:
      - "${DASHBOARD_PORT:-3000}:3000"
    depends_on:
      - api
    restart: unless-stopped

networks:
  default:
    name: ai-radar-network
